version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bzfuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bzfpassword}
      POSTGRES_DB: ${POSTGRES_DB:-bzftrainer}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bzfuser -d bzftrainer"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - bzf-db-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://bzfuser:bzfpassword@db:5432/bzftrainer}
      PDF_PATH: ${PDF_PATH:-/data/questions.pdf}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/data/questions.pdf:/data/questions.pdf


  frontend:
    build: ./frontend
    ports:
      - "5123:80"
    depends_on:
      - backend

volumes:
  bzf-db-data:
