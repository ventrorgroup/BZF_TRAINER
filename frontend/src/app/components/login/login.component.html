<div class="login-wrapper">
  <div class="login-container glass-card">
    <div class="login-header">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="plane-icon"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3.5c-.5-.5-2.5 0-4 1.5L13.5 8.5 5.3 6.7c-.9-.2-1.8.3-2 1.2-.2.8.2 1.7.9 2.1l7.8 3.7-3.9 3.9-3.1-.3c-.6 0-1.1.4-1.2 1-.1.7.3 1.3 1 1.4l5.2 1.1 1.1 5.2c.1.7.7 1.1 1.4 1 .6-.1 1-.6 1-1.2l-.3-3.1 3.9-3.9 3.7 7.8c.3.7 1.1 1.1 1.9.9.9-.2 1.4-1.1 1.2-2z"/></svg>
      </div>
      <h1 class="gradient-text">BZF Trainer Pro</h1>
      <p class="subtitle">Flugsicherheits- & Funksprech-Trainingsportal</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
      <div class="form-group">
        <label for="password">Passwort eingeben</label>
        <div class="input-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input 
            type="password" 
            id="password" 
            name="password"
            [(ngModel)]="password" 
            placeholder="••••••••" 
            required 
            [disabled]="isLoading"
            autocomplete="current-password"
            class="password-input"
          />
        </div>
      </div>

      @if (errorMessage) {
        <div class="error-alert glass-card">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="error-icon"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
          <span>{{ errorMessage }}</span>
        </div>
      }

      <button type="submit" [disabled]="isLoading || !password" class="btn-primary login-btn">
        @if (isLoading) {
          <span class="spinner"></span>
          <span>Verifiziere...</span>
        } @else {
          <span>Anmelden</span>
        }
      </button>
    </form>

    <div class="login-footer">
      <p><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Gesicherte Sitzung</p>
    </div>
  </div>
</div>
